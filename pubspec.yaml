name: ticksave
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

# AQUÍ ES DONDE SE PONEN LAS LIBRERÍAS
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mobile_scanner: ^5.0.0  # <--- Aquí es donde debe ir, alineado con los de arriba
  # Núcleo de Firebase: inicialización y configuración
  firebase_core: ^4.5.0
  # Autenticación de usuarios (email/contraseña, Google, etc.)
  firebase_auth: ^6.2.0
  google_sign_in: ^6.2.1
  # Base de datos Cloud Firestore para guardar tickets y alertas
  cloud_firestore: ^6.1.3
  # Storage para guardar las imagenes de los tickets
  firebase_storage: ^13.2.0
  # Camara, OCR y Fechas
  image_picker: ^1.2.1
  flutter_image_compress: ^2.4.0
  google_mlkit_text_recognition: ^0.15.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0
  http: ^1.6.0
  archive: ^4.0.9
  share_plus: ^13.0.0
  add_2_calendar: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true